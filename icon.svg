<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2917"/>
      <stop offset=".45" stop-color="#2a1c10"/>
      <stop offset="1" stop-color="#120a05"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffdf9e" stop-opacity=".6"/>
      <stop offset="1" stop-color="#ffdf9e" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="30%" r="52%">
      <stop offset="0" stop-color="#ffd98a" stop-opacity=".5"/>
      <stop offset="60%" stop-color="#ffd98a" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#ffd98a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c0805"/>
      <stop offset="1" stop-color="#050302"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffefc8"/>
      <stop offset=".5" stop-color="#eec779"/>
      <stop offset="1" stop-color="#a5732f"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="46%" r="72%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity=".6"/>
    </radialGradient>
  </defs>

  <!-- sıcak salon zemini -->
  <rect width="1024" height="1024" fill="url(#sky)"/>

  <!-- geri çekilen sivri kemerler (derinlik) -->
  <g fill="none" stroke-linejoin="round">
    <path d="M120 800 L120 380 Q120 150 512 118 Q904 150 904 380 L904 800" stroke="#5a4327" stroke-width="26"/>
    <path d="M120 800 L120 380 Q120 150 512 118 Q904 150 904 380 L904 800" stroke="#7a5c35" stroke-width="6"/>
    <path d="M210 800 L210 400 Q210 214 512 188 Q814 214 814 400 L814 800" stroke="#4a3720" stroke-width="20"/>
    <path d="M292 800 L292 424 Q292 268 512 246 Q732 268 732 424 L732 800" stroke="#3a2a18" stroke-width="16"/>
  </g>
  <!-- iç niş (figür arkası) -->
  <path d="M292 800 L292 424 Q292 268 512 246 Q732 268 732 424 L732 800 Z" fill="#1c1209"/>

  <!-- pencereden sıcak ışık huzmesi -->
  <polygon points="740,40 1000,40 650,940 450,940" fill="url(#beam)" opacity=".85"/>
  <polygon points="300,70 480,70 470,940 350,940" fill="url(#beam)" opacity=".3"/>
  <!-- figür ardı altın ışıma (backlight) -->
  <ellipse cx="512" cy="330" rx="370" ry="390" fill="url(#halo)"/>
  <ellipse cx="512" cy="310" rx="170" ry="200" fill="#ffe6ae" opacity=".22"/>

  <!-- ==== CÜBBELİ AVUKAT — TAM SİLÜET ==== -->
  <!-- baş -->
  <ellipse cx="512" cy="348" rx="62" ry="74" fill="url(#robe)"/>
  <rect x="476" y="396" width="72" height="36" fill="url(#robe)"/>
  <!-- cübbe: geniş omuzlar, bol kollar, yere dökülen etek -->
  <path d="M512 416
           C448 422 412 446 394 492
           C370 556 340 664 320 768
           Q314 798 342 793
           C366 788 386 756 398 712
           C390 800 384 900 380 984
           L644 984
           C640 900 634 800 626 712
           C638 756 658 788 682 793
           Q710 798 704 768
           C684 664 654 556 630 492
           C612 446 576 422 512 416 Z" fill="url(#robe)"/>
  <!-- cübbenin önden dökülen kıvrımı (siluet içinde hafif ton farkı) -->
  <path d="M512 470 L500 984 L524 984 Z" fill="#150d07" opacity=".8"/>
  <path d="M448 520 Q436 720 430 960 L446 960 Q452 720 462 530 Z" fill="#150d07" opacity=".5"/>
  <path d="M576 530 Q586 720 592 960 L578 960 Q572 720 562 520 Z" fill="#150d07" opacity=".5"/>

  <!-- sıcak kenar ışığı (rim) -->
  <g fill="none" stroke="#ffd98a" stroke-linecap="round">
    <path d="M552 288 Q574 322 570 372" stroke-width="9" opacity=".9"/>
    <path d="M604 460 Q638 540 662 640 Q686 760 700 900 Q704 944 706 976" stroke-width="10" opacity=".85"/>
    <path d="M584 430 Q600 452 612 484" stroke-width="6" opacity=".5"/>
  </g>
  <!-- sol tarafta zayıf sıcak dolgu -->
  <path d="M428 470 Q400 570 384 712 Q374 850 370 956" fill="none" stroke="#b98d4e" stroke-width="6" stroke-linecap="round" opacity=".45"/>

  <!-- taban gölgesi -->
  <ellipse cx="512" cy="988" rx="250" ry="28" fill="#000" opacity=".5"/>

  <!-- vinyet -->
  <rect width="1024" height="1024" fill="url(#vig)"/>
  <!-- yazı için alt karartma -->
  <rect x="0" y="772" width="1024" height="252" fill="#0d0704" opacity=".55"/>

  <!-- ==== BAŞLIK ==== -->
  <g transform="translate(512 916) scale(.82 1)">
    <text x="0" y="0" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="130"
          fill="url(#txt)" stroke="#241206" stroke-width="5" paint-order="stroke">ADALET PEŞİNDE</text>
  </g>
</svg>
